<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h1 { color: #ff0000; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background-color: #ff0000; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        #downloadArea { display: none; margin-top: 25px; }
        .timer { font-size: 40px; color: #ff0000; font-weight: bold; margin: 15px 0; }
        #finalBtn { display: none; background: #28a745; color: white; text-decoration: none; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Video Downloader</h1>
    <input type="text" id="videoUrl" placeholder="Paste YouTube link here...">
    <button id="startBtn" onclick="initiate()">Generate Download Link</button>

    <div id="downloadArea">
        <p id="statusMsg">Securing your link...</p>
        <div id="timer" class="timer">30</div>
        <a id="finalBtn" href="#" target="_blank">DOWNLOAD NOW</a>
    </div>
</div>

<script>
    // These are your verified working keys
    const MY_KEY = "315881a046msha16960ed1d208c3p1b39cfjsn62c4216d1929"; 
    const MY_AD = "https://www.profitablecpmratenetwork.com/b6im8bf5?key=7d657e1fdb3b47478d6ff2e6e3e1dd06";

    function initiate() {
        const inputVal = document.getElementById('videoUrl').value;
        if(!inputVal) { alert("Please paste a link first!"); return; }

        // Open Adsterra link
        window.open(MY_AD, '_blank');

        // Show Timer
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('downloadArea').style.display = 'block';

        let timeLeft = 30;
        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById('statusMsg').innerText = "Link Found!";
                getLink(inputVal);
            }
        }, 1000);
    }

    async function getLink(vidUrl) {
        const options = {
            method: 'GET',
            headers: {
                'x-rapidapi-key': MY_KEY,
                'x-rapidapi-host': 'youtube-video-download-api.p.rapidapi.com'
            }
        };

        try {
            const response = await fetch(https://youtube-video-download-api.p.rapidapi.com/v1/info?url=${encodeURIComponent(vidUrl)}, options);
            const data = await response.json();
            
            // This is the part that was failing before
            const finalUrl = data.link || (data.formats && data.formats[0].url);

            if(finalUrl) {
                document.getElementById('timer').style.display = 'none';
                const btn = document.getElementById('finalBtn');
                btn.href = finalUrl;
                btn.style.display = 'block';
            } else {
                alert("API could not find the video. Try another link.");
            }
        } catch (err) {
            alert("Error connecting to the downloader server.");
        }
    }
</script>

</body>
</html>
