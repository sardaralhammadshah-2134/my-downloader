<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #ff0000; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #downloadArea { display: none; margin-top: 20px; }
        .timer { font-size: 30px; color: #e67e22; font-weight: bold; margin: 10px 0; }
        #finalBtn { display: none; background: #27ae60; color: white; text-decoration: none; padding: 15px; border-radius: 8px; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Video Downloader</h1>
    <input type="text" id="videoUrl" placeholder="Paste YouTube link here...">
    <button id="startBtn" onclick="initiateDownload()">Generate Download Link</button>

    <div id="downloadArea">
        <p id="statusMsg">Waiting for ad... your link prepares in:</p>
        <div id="timer" class="timer">30</div>
        <a id="finalBtn" href="#" style="display:none;">DOWNLOAD NOW</a>
    </div>
</div>

<script>
    // FILL THESE TWO CAREFULLY
    const MY_RAPIDAPI_KEY = "315881a046msha16960ed1d208c3p1b39cfjsn62c4216d1929"; 
    const MY_AD_DIRECT_LINK = "https://www.profitablecpmratenetwork.com/b6im8bf5?key=7d657e1fdb3b47478d6ff2e6e3e1dd06";

    function initiateDownload() {
        const urlInput = document.getElementById('videoUrl').value;
        if(!urlInput) { alert("Please paste a link!"); return; }

        // Try to open ad - if it fails, the script continues anyway
        try {
            window.open(MY_AD_DIRECT_LINK, '_blank');
        } catch (e) {
            console.log("Ad blocked");
        }

        // Switch UI
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('downloadArea').style.display = 'block';

        let count = 30;
        const countdown = setInterval(() => {
            count--;
            document.getElementById('timer').innerText = count;
            if(count <= 0) {
                clearInterval(countdown);
                document.getElementById('statusMsg').innerText = "Generating link...";
                fetchVideo(urlInput);
            }
        }, 1000);
    }

    async function fetchVideo(vidUrl) {
        const options = {
            method: 'GET',
            headers: {
                'x-rapidapi-key': MY_RAPIDAPI_KEY,
                'x-rapidapi-host': 'youtube-video-download-api.p.rapidapi.com'
            }
        };

        try {
            const response = await fetch(https://youtube-video-download-api.p.rapidapi.com/v1/info?url=${encodeURIComponent(vidUrl)}, options);
            const data = await response.json();
            const link = data.link || data.url || (data.formats && data.formats[0].url);

            if(link) {
                document.getElementById('statusMsg').innerText = "Ready!";
                document.getElementById('timer').style.display = 'none';
                const dBtn = document.getElementById('finalBtn');
                dBtn.href = link;
                dBtn.style.display = 'block';
            } else {
                alert("API didn't return a link. Key might be expired.");
            }
        } catch (err) {
            alert("Error connecting to API.");
        }
    }
</script>

</body>
</html>
