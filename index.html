<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h1 { color: #d63031; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; }
        button { background: #d63031; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #timerSection { display: none; margin-top: 20px; }
        #downloadBtn { display: none; background: #00b894; color: white; text-decoration: none; padding: 15px; border-radius: 10px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>Video Downloader</h1>
    <input type="text" id="userInput" placeholder="Paste YouTube Link Here">
    <button id="mainBtn" onclick="process()">Generate Download Link</button>

    <div id="timerSection">
        <p id="msg">Preparing your link...</p>
        <div style="font-size: 40px; font-weight: bold;" id="clock">30</div>
        <a id="downloadBtn" href="#" target="_blank">DOWNLOAD NOW</a>
    </div>
</div>

<script>
    const API_KEY = "315881a046msha16960ed1d208c3p1b39cfjsn62c4216d1929"; 
    const AD_LINK = "https://www.profitablecpmratenetwork.com/b6im8bf5?key=7d657e1fdb3b47478d6ff2e6e3e1dd06";

    function process() {
        const inputField = document.getElementById('userInput');
        const linkValue = inputField.value; // Ignore the red underline in GitHub editor
        
        if(!linkValue) { alert("Please paste a link!"); return; }

        // Open your ad link
        window.open(AD_LINK, '_blank');

        // Show the timer area
        document.getElementById('mainBtn').style.display = 'none';
        document.getElementById('timerSection').style.display = 'block';

        let seconds = 30;
        const countdown = setInterval(() => {
            seconds--;
            document.getElementById('clock').innerText = seconds;
            if(seconds <= 0) {
                clearInterval(countdown);
                fetchVideo(linkValue);
            }
        }, 1000);
    }

    async function fetchVideo(videoUrl) {
        const options = {
            method: 'GET',
            headers: {
                'x-rapidapi-key': API_KEY,
                'x-rapidapi-host': 'youtube-video-download-api.p.rapidapi.com'
            }
        };

        try {
            const response = await fetch(https://youtube-video-download-api.p.rapidapi.com/v1/info?url=${encodeURIComponent(videoUrl)}, options);
            const data = await response.json();
            const dl = data.link || data.url || (data.formats && data.formats[0].url);

            if(dl) {
                document.getElementById('clock').style.display = 'none';
                document.getElementById('msg').innerText = "Link Ready!";
                const btn = document.getElementById('downloadBtn');
                btn.href = dl;
                btn.style.display = 'block';
            }
        } catch (e) {
            alert("Error fetching video. Please refresh.");
        }
    }
</script>

</body>
</html>
