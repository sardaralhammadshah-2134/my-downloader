<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Video Downloader & Converter</title>
    <style>
        /* This makes the site look modern and clean */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        h1 { color: #ff0000; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #ff0000; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; transition: 0.3s; width: 100%; }
        button:hover { background-color: #cc0000; }
        #downloadArea { display: none; margin-top: 25px; padding: 20px; border-top: 1px solid #eee; }
        .timer-box { font-size: 24px; color: #e67e22; font-weight: bold; margin: 15px 0; }
        #finalBtn { display: none; background-color: #27ae60; text-decoration: none; color: white; padding: 15px; border-radius: 8px; font-weight: bold; }
        .ad-slot { margin: 20px 0; min-height: 100px; background: #fafafa; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #999; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Video Downloader</h1>
        <p>Download any YouTube video for free!</p>

        <div class="ad-slot">
            Your Banner Ad Code Goes Here
        </div>

        <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
        <button id="startBtn" onclick="initiateDownload()">Generate Download Link</button>

        <div id="downloadArea">
            <p id="statusMsg">Preparing your high-quality link...</p>
            <div id="timer" class="timer-box">30</div>
            <a id="finalBtn" href="#" target="_blank">Click Here to Download File</a>
        </div>
        
        <p style="font-size: 12px; margin-top: 20px; color: #888;">By using this service you agree to our Terms.</p>
    </div>

   <script>
    // 1. YOUR SETTINGS
    const MY_RAPIDAPI_KEY = "PASTE_YOUR_RAPID_KEY_HERE"; 
    const MY_AD_DIRECT_LINK = "PASTE_YOUR_ADSTERRA_LINK_HERE";

    async function initiateDownload() {
        const urlInput = document.getElementById('videoUrl').value;
        
        if(!urlInput) {
            alert("Please paste a YouTube link first!");
            return;
        }

        // 2. RUN THE AD (MONEY STEP)
        console.log("Attempting to open ad...");
        window.open(MY_AD_DIRECT_LINK, '_blank');

        // 3. SHOW THE TIMER
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('downloadArea').style.display = 'block';
        
        let seconds = 30;
        const timerLabel = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            seconds--;
            timerLabel.innerText = seconds;
            if(seconds <= 0) {
                clearInterval(countdown);
                document.getElementById('statusMsg').innerText = "Fetching your video link...";
                fetchVideo(urlInput);
            }
        }, 1000);
    }

    async function fetchVideo(videoUrl) {
        // This is the call to RapidAPI
        const options = {
            method: 'GET',
            headers: {
                'x-rapidapi-key': MY_RAPIDAPI_KEY,
                'x-rapidapi-host': 'youtube-video-download-api.p.rapidapi.com'
            }
        };

        try {
            const response = await fetch(https://youtube-video-download-api.p.rapidapi.com/v1/info?url=${encodeURIComponent(videoUrl)}, options);
            const data = await response.json();
            
            // Note: Different APIs use different names. We try the most common ones:
            const link = data.link || data.url || (data.formats && data.formats[0].url);

            if(link) {
                const btn = document.getElementById('finalBtn');
                btn.href = link;
                btn. style.display = 'block';
                document.getElementById('statusMsg').innerText = "Success! Your video is ready.";
            } else {
                alert("The API couldn't find a download link. Try another video.");
            }
        } catch (error) {
            alert("API Error: Make sure your RapidAPI key is correct and you haven't hit the daily limit.");
            console.error(error);
        }
    }
</script>

</body>
</html>
</html>
