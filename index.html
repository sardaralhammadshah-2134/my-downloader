<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h1 { color: #d63031; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        button { background: #d63031; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #b32d2d; }
        #downloadArea { display: none; margin-top: 20px; }
        .timer-num { font-size: 40px; color: #fab1a0; font-weight: bold; margin: 10px 0; }
        #finalBtn { display: none; background: #00b894; color: white; text-decoration: none; padding: 15px; border-radius: 10px; margin-top: 15px; font-weight: bold; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h1>Video Downloader</h1>
    <p>Free High-Speed Downloads</p>
    <input type="text" id="videoUrl" placeholder="Paste YouTube Link Here">
    <button id="startBtn" onclick="initiateDownload()">Generate Download Link</button>

    <div id="downloadArea">
        <p id="statusMsg">Waiting for ad... link prepares in:</p>
        <div class="timer-num" id="timer">30</div>
        <a id="finalBtn" href="#" style="display:none;">DOWNLOAD NOW</a>
    </div>
</div>

<script>
    // These are your specific working keys from the screenshots
    const MY_RAPIDAPI_KEY = "315881a046msha16960ed1d208c3p1b39cfjsn62c4216d1929"; 
    const MY_AD_DIRECT_LINK = "https://www.profitablecpmratenetwork.com/b6im8bf5?key=7d657e1fdb3b47478d6ff2e6e3e1dd06";

    function initiateDownload() {
        const urlInput = document.getElementById('videoUrl').value;
        if(!urlInput) { alert("Please paste a link!"); return; }

        // 1. Profit: Open the ad in a new tab
        try {
            window.open(MY_AD_DIRECT_LINK, '_blank');
        } catch (e) {
            console.log("Ad blocked by browser");
        }

        // 2. Switch UI to show timer
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('downloadArea').style.display = 'block';

        let count = 30;
        const countdown = setInterval(() => {
            count--;
            document.getElementById('timer').innerText = count;
            
            if(count <= 0) {
                clearInterval(countdown);
                document.getElementById('statusMsg').innerText = "Generating link...";
                fetchVideo(urlInput);
            }
        }, 1000);
    }

    async function fetchVideo(vidUrl) {
        const options = {
            method: 'GET',
            headers: {
                'x-rapidapi-key': MY_RAPIDAPI_KEY,
                'x-rapidapi-host': 'youtube-video-download-api.p.rapidapi.com'
            }
        };

        try {
            const response = await fetch(https://youtube-video-download-api.p.rapidapi.com/v1/info?url=${encodeURIComponent(vidUrl)}, options);
            const data = await response.json();
            
            // Try to find the download link in different possible API response formats
            const link = data.link || data.url || (data.formats && data.formats[0].url);

            if(link) {
                document.getElementById('statusMsg').innerText = "Ready! Click below:";
                document.getElementById('timer').style.display = 'none';
                const dBtn = document.getElementById('finalBtn');
                dBtn.href = link;
                dBtn.style.display = 'block';
            } else {
                alert("API could not find a link. Your RapidAPI key might have expired or reached its limit.");
            }
        } catch (err) {
            alert("Connection error. Check your internet or API status.");
        }
    }
</script>

</body>
</html>
