<!DOCTYPE html>
<html>
<head>
    <title>Free Video Downloader</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; }
        #downloadArea { display: none; margin-top: 20px; }
        .timer { font-size: 20px; color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Download YouTube Videos</h1>
    <input type="text" id="videoUrl" placeholder="Paste YouTube Link Here" style="width: 300px; padding: 10px;">
    <button onclick="startProcess()">Get Download Link</button>

    <div id="downloadArea">
        <p id="statusText">Please wait 30 seconds for your link...</p>
        <div id="timerDisplay" class="timer">30</div>
        <a id="finalLink" href="#" style="display:none; padding: 10px 20px; background: green; color: white; text-decoration: none;">Download Now</a>
    </div>

    <script>
        async function startProcess() {
            const url = document.getElementById('videoUrl').value;
            if(!url) return alert("Paste a URL first!");

            // Show timer and hide the button
            document.getElementById('downloadArea').style.display = 'block';
            let seconds = 30;
            
            const countdown = setInterval(() => {
                seconds--;
                document.getElementById('timerDisplay').innerText = seconds;
                if(seconds <= 0) {
                    clearInterval(countdown);
                    fetchVideoLink(url);
                }
            }, 1000);
        }

        async function fetchVideoLink(videoUrl) {
            const options = {
                method: 'GET',
                headers: {
                    'X-RapidAPI-Key': '315881a046msha16960ed1d208c3p1b39cfjsn62c4216d1929', // PASTE YOUR KEY HERE
                    'X-RapidAPI-Host': 'youtube-video-download-api.p.rapidapi.com'
                }
            };

            try {
                // This calls the free service
                const response = await fetch(https://youtube-video-download-api.p.rapidapi.com/v1/info?url=${encodeURIComponent(videoUrl)}, options);
                const data = await response.json();
                
                // Show the link to the user
                const link = data.link; // Note: The actual property name might vary by API
                document.getElementById('statusText').innerText = "Link Ready!";
                document.getElementById('timerDisplay').style.display = 'none';
                document.getElementById('finalLink').href = link;
                document.getElementById('finalLink').style.display = 'inline-block';
            } catch (error) {
                alert("Error fetching video. Try again.");
            }
        }
    </script>
</body>
</html>
